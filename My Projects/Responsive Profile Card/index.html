


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <script src="https://kit.fontawesome.com/761fdd6338.js" crossorigin="anonymous"></script>
    <title>Profile-card</title>
</head>
<body>
    <div class="card">
        <div class="img">
            <img src="/images/vashu.jpg" alt="">
        </div>
        <div class="card-content">
            <h1>Vashu <span>Kashyap</span></h1>
            <h5>India (New Delhi)</h5>
            <h3>Front-End Web Developer</h3>
            <h4>Skills</h4>
            <p>Html | Css | Javascript | Bootstrap | Jquerry   | React. Js | UI/UX Desinger</p>
            <div class="profile-btn">
                <button >Follow <i class="fa-solid fa-user-plus"></i></button>
                <button>Message <i class="fa-solid fa-comments"></i></button>
            </div>
        </div>
        <div class="social-bar">
            <ul>
                <li><a href=""><i class="fa-brands fa-square-instagram active"></i></a></li>
                <li><a href=""><i class="fa-brands fa-square-facebook"></i></a></li>
                <li class="linkedin"><a href=""><i class="fa-brands fa-linkedin"></i></a></li>
                <li><a href=""><i class="fa-brands fa-square-twitter"></i></a></li>
            </ul>
        </div>
    </div>
</body>
</html>
